<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice #29</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: #eee;
            padding: 40px;
        }

        .invoice-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            max-width: 700px;
            margin: auto;
        }

        h1, h2, h3 {
            color: #d4af37; /* Luxury gold */
            margin-bottom: 5px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .info-box {
            margin-bottom: 25px;
            padding: 15px;
            background: #151515;
            border-radius: 10px;
            border: 1px solid #2a2a2a;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .info-label {
            color: #888;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th {
            background: #222;
            color: #d4af37;
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .total-box {
            margin-top: 25px;
            padding: 20px;
            background: #151515;
            border-radius: 10px;
            border: 1px solid #2a2a2a;
            font-size: 18px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #777;
            font-size: 14px;
        }

        @media print {
            body {
                background: white;
                color: black;
            }
            .invoice-container {
                background: white;
                border: none;
                color: black;
            }
            h1, h2, h3 {
                color: black;
            }
            th {
                background: #eee;
                color: black;
            }
        }
    </style>
</head>

<body>

<div class="invoice-container">

    <div class="header-section">
        <h1>INVOICE</h1>
        <h3>#29</h3>
    </div>

    <div class="info-box">
        <div class="info-row">
            <span class="info-label">Date:</span>
            <span>2026-03-04 01:22:23</span>
        </div>

        <div class="info-row">
            <span class="info-label">Customer:</span>
            <span>Walk-in Customer</span>
        </div>

        <div class="info-row">
            <span class="info-label">Store:</span>
            <span>storage 1</span>
        </div>
    </div>

    <h3>Items</h3>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Price (R)</th>
                <th>Total (R)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>SSD Hard Drive 1TB</td>
                <td>1</td>
                <td>0.00</td>
                <td>0.00</td>
            </tr>
        </tbody>
    </table>

    <div class="total-box">
        <strong>Total Amount:</strong>
        R 0.00
    </div>

    <div class="footer">
        Thank you for your purchase.<br>
        Powered by your Luxury Retail System.
    </div>

</div>

</body>
</html>
