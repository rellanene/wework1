{% extends "base.html" %}
{% block title %}Returns{% endblock %}
{% block content %}

<h1 class="page-title">Process a Return</h1>

<div class="card">
    <h3>Validate Invoice</h3>

    <form id="invoiceForm">
        <label>Invoice Number</label>
        <input type="text" id="invoice_number" required>
        <button type="submit" class="btn-primary">Load Invoice</button>
    </form>

    <p id="invoiceError" class="flash flash-danger" style="display:none;"></p>
</div>

<div id="returnSection" style="display:none;">
    <div class="card">
        <h3>Invoice Details</h3>
        <p><strong>Customer:</strong> <span id="custName"></span></p>
        <p><strong>Date:</strong> <span id="saleDate"></span></p>
        <p><strong>Store:</strong> <span id="storeName"></span></p>
    </div>

    <div class="card">
        <h3>Select Items to Return</h3>

        <table class="table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Sold Qty</th>
                    <th>Return Qty</th>
                </tr>
            </thead>
            <tbody id="itemsTable"></tbody>
        </table>

        <button class="btn-primary" onclick="submitReturn()">Process Return</button>
    </div>
</div>

<script>

// -------------------------------
// LOAD INVOICE
// -------------------------------
document.getElementById("invoiceForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const invoice = document.getElementById("invoice_number").value;

    fetch(`/returns/load/${invoice}`)
        .then(res => res.json())
        .then(data => {
            if (!data.success) {
                showPopup(data.message, "error");
                document.getElementById("invoiceError").innerText = data.message;
                document.getElementById("invoiceError").style.display = "block";
                return;
            }

            document.getElementById("invoiceError").style.display = "none";
            document.getElementById("returnSection").style.display = "block";

            document.getElementById("custName").innerText = data.customer;
            document.getElementById("saleDate").innerText = data.date;
            document.getElementById("storeName").innerText = data.store;

            let html = "";
            data.items.forEach(item => {
                html += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>
                            <input type="number" 
                                   min="0" 
                                   max="${item.quantity}" 
                                   value="0"
                                   id="return_${item.product_id}"
                                   onchange="validateReturnQty(this, ${item.quantity})">
                        </td>
                    </tr>
                `;
            });

            document.getElementById("itemsTable").innerHTML = html;
        });
});

// -------------------------------
// VALIDATE RETURN QTY
// -------------------------------
function validateReturnQty(input, soldQty) {
    const returnQty = parseFloat(input.value) || 0;

    if (returnQty > soldQty) {
        showPopup("Return quantity cannot exceed sold quantity.", "error");
        input.value = soldQty;
    }
}

// -------------------------------
// SUBMIT RETURN
// -------------------------------
function submitReturn() {
    const invoice = document.getElementById("invoice_number").value;
    const rows = document.querySelectorAll("#itemsTable tr");
    let items = [];

    rows.forEach(row => {
        const input = row.querySelector("input");
        const qty = parseInt(input.value);
        const product_id = input.id.replace("return_", "");

        if (qty > 0) {
            items.push({ product_id, quantity: qty });
        }
    });

    fetch(`/returns/process/${invoice}`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({items})
    })
    .then(res => res.json())
    .then(data => {

        showPopup(data.message, data.success ? "success" : "error");

        if (data.success) {
            setTimeout(() => {
                window.location.href = `/returns/document/${data.return_id}`;
            }, 1200);
        }
    })
    .catch(() => showPopup("Unexpected error occurred.", "error"));
}

</script>

{% endblock %}
