<div class="email-card">

    <h2 style="margin-bottom:10px;">Forward Email</h2>

    <form id="forwardForm">

        <input type="hidden" name="email_id" value="{{ email.id }}">

        <div style="margin-bottom:10px;">
            <label><strong>To:</strong></label>
            <input class="form-control" name="to" placeholder="Enter recipient email...">
        </div>

        <div style="margin-bottom:10px;">
            <label><strong>Subject:</strong></label>
            <input class="form-control" name="subject" value="Fwd: {{ email.subject }}">
        </div>

        <div style="margin-bottom:10px;">
            <label><strong>Message:</strong></label>
            <textarea class="form-control" name="body" rows="10">
---------- Forwarded message ----------
From: {{ email.from_name }} <{{ email.from_email }}>
Sent: {{ email.sent_at }}
To: {{ email.to_summary }}

{{ email.body_text }}
            </textarea>
        </div>

        <button class="btn-primary" type="button" onclick="sendForward()">Send Forward</button>

    </form>

</div>
