{% extends "base.html" %}
{% block title %}Point of Sale{% endblock %}

{% block content %}

<style>
    /* Layout */
    .pos-wrapper {
        display: flex;
        gap: 24px;
        margin-top: 20px;
    }

    /* Panels */
    .pos-panel {
        background: #ffffff;
        padding: 24px;
        border-radius: 14px;
        border: 1px solid #d7dfe9;
        flex: 1;
        box-shadow: 0 3px 10px rgba(0,0,0,0.06);
        transition: 0.25s ease;
    }

    .pos-panel:hover {
        box-shadow: 0 6px 16px rgba(0,0,0,0.10);
    }

    .pos-panel h3 {
        font-size: 20px;
        font-weight: 600;
        color: #1a2b49;
        border-left: 4px solid #c8a24a;
        padding-left: 12px;
        margin-bottom: 18px;
    }

    /* Products Grid */
    .products-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
    }

    .product-card {
        padding: 16px;
        border: 1px solid #d7dfe9;
        border-radius: 12px;
        text-align: center;
        cursor: pointer;
        background: #fafbfd;
        transition: 0.2s ease;
    }

    .product-card:hover {
        background: #f3f5fa;
        border-color: #c8a24a;
    }

    /* Cart Table */
    .cart-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    .cart-table th {
        background: #f3f5fa;
        padding: 12px;
        font-weight: 600;
        color: #1a2b49;
        border-bottom: 2px solid #d0d8e8;
    }

    .cart-table td {
        padding: 12px;
        border-bottom: 1px solid #e6eaf2;
    }

    /* Checkout Box */
    .checkout-box {
        margin-top: 20px;
        padding: 18px;
        background: #f8f9fc;
        border-radius: 12px;
        border: 1px solid #d7dfe9;
    }

    /* Buttons */
    .btn {
        padding: 10px 15px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        color: white;
        transition: 0.2s ease;
    }

    .btn-checkout {
        background: #1a2b49;
        width: 100%;
        font-size: 18px;
    }

    .btn-checkout:hover {
        background: #152238;
    }

    .btn-remove {
        background: #b02a37;
        padding: 6px 12px;
        border-radius: 6px;
    }

    /* Inputs */
    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #cfd7e6;
        margin-bottom: 12px;
        font-size: 14px;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #c8a24a;
        box-shadow: 0 0 4px rgba(200,162,74,0.4);
    }
</style>

<h2 class="settings-title">Point of Sale</h2>

<div class="pos-wrapper">

    <!-- PRODUCTS PANEL -->
    <div class="pos-panel">
        <h3>Products</h3>

        <div class="products-grid">
            {% for p in products %}
            <div class="product-card" onclick="addToCart({{ p.id }}, '{{ p.name }}', {{ p.price }})">
                <strong>{{ p.name }}</strong><br>
                <span>R {{ "%.2f"|format(p.price) }}</span>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- CART PANEL -->
    <div class="pos-panel">
        <h3>Cart</h3>

        <table class="cart-table" id="cartTable">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="cartBody"></tbody>
        </table>

        <div class="checkout-box">
            <div style="display:flex; justify-content:space-between;">
                <span>Subtotal:</span>
                <strong id="subtotal">R 0.00</strong>
            </div>

            <div style="display:flex; justify-content:space-between;">
                <span>VAT (15%):</span>
                <strong id="vat">R 0.00</strong>
            </div>

            <div style="display:flex; justify-content:space-between; font-size:20px;">
                <span><strong>Total:</strong></span>
                <strong id="total">R 0.00</strong>
            </div>

            <br>

            <!-- PAYMENT FORM -->
            <form method="POST" action="/pos_process_sale" onsubmit="preparePOSSubmit()">
                <input type="hidden" name="cart_data" id="cartData">
                <input type="hidden" name="payment_method" id="paymentMethodField">
                <input type="hidden" name="amount_paid" id="amountPaidField">
                <input type="hidden" name="change_due" id="changeDueField">

                <label><strong>Payment Method</strong></label>
                <select id="paymentMethod" name="payment_method" onchange="toggleCashFields()">
                    <option value="Cash">Cash</option>
                    <option value="Card">Card</option>
                    <option value="EFT">EFT</option>
                </select>

                <div id="cashFields" style="margin-top:15px;">
                    <label>Amount Paid</label>
                    <input type="number" step="0.01" id="amountPaid" oninput="calculateChange()">

                    <label>Change</label>
                    <input type="text" id="changeDue" readonly>
                </div>

                <br>
                <button class="btn btn-checkout">Complete Sale</button>
            </form>
        </div>
    </div>

</div>

<script>
    let cart = [];

    function addToCart(id, name, price) {
        let item = cart.find(i => i.id === id);
        if (item) {
            item.qty += 1;
        } else {
            cart.push({ id, name, price, qty: 1 });
        }
        renderCart();
    }

    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        renderCart();
    }

    function renderCart() {
        let tbody = document.getElementById("cartBody");
        tbody.innerHTML = "";

        let subtotal = 0;

        cart.forEach(item => {
            let total = item.price * item.qty;
            subtotal += total;

            tbody.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>R ${item.price.toFixed(2)}</td>
                    <td>R ${total.toFixed(2)}</td>
                    <td><button class="btn btn-remove" onclick="removeItem(${item.id})">Remove</button></td>
                </tr>
            `;
        });

        let vat = subtotal * 0.15;
        let total = subtotal + vat;

        document.getElementById("subtotal").innerText = "R " + subtotal.toFixed(2);
        document.getElementById("vat").innerText = "R " + vat.toFixed(2);
        document.getElementById("total").innerText = "R " + total.toFixed(2);

        document.getElementById("cartData").value = JSON.stringify(cart);
    }

    function toggleCashFields() {
        let method = document.getElementById("paymentMethod").value;
        document.getElementById("cashFields").style.display = (method === "Cash") ? "block" : "none";
    }

    function calculateChange() {
        let total = parseFloat(document.getElementById("total").innerText.replace("R ", ""));
        let paid = parseFloat(document.getElementById("amountPaid").value || 0);
        let change = paid - total;
        document.getElementById("changeDue").value = "R " + change.toFixed(2);
    }

    function preparePOSSubmit() {
        document.getElementById("paymentMethodField").value = document.getElementById("paymentMethod").value;
        document.getElementById("amountPaidField").value = document.getElementById("amountPaid").value || 0;
        document.getElementById("changeDueField").value = document.getElementById("changeDue").value || "0";
    }
</script>

{% endblock %}
