{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h2 class="mb-3">Register</h2>

    <form method="POST">

        <label>User Type</label>
        <select name="user_type" class="form-control" required>
            <option value="end_user">Business Owner</option>
            <option value="staff">Staff User</option>
        </select>

        <div id="businessNameField" class="mt-3">
            <label>Business Name</label>
            <input type="text" name="business_name" class="form-control">
        </div>

        <div id="businessSelectField" class="mt-3" style="display:none;">
            <label>Select Business</label>
            <select name="business_id" class="form-control">
                {% for b in businesses %}
                <option value="{{ b.id }}">{{ b.name }}</option>
                {% endfor %}
            </select>
        </div>

        <label class="mt-3">Full Name</label>
        <input type="text" name="name" class="form-control" required>

        <label class="mt-3">Email</label>
        <input type="email" name="email" class="form-control" required>

        <label class="mt-3">Password</label>
        <input type="password" name="password" class="form-control" required>

        <hr class="mt-4">

        <h4>Security Questions</h4>

        {% for i in range(1,6) %}
        <label class="mt-3">Question {{ i }}</label>
        <input type="text" name="question{{ i }}" class="form-control" required>

        <label class="mt-1">Answer {{ i }}</label>
        <input type="text" name="answer{{ i }}" class="form-control" required>
        {% endfor %}

        <button class="btn btn-primary mt-4 w-100">Register</button>
    </form>
</div>

<script>
document.querySelector("select[name='user_type']").addEventListener("change", function() {
    if (this.value === "end_user") {
        document.getElementById("businessNameField").style.display = "block";
        document.getElementById("businessSelectField").style.display = "none";
    } else {
        document.getElementById("businessNameField").style.display = "none";
        document.getElementById("businessSelectField").style.display = "block";
    }
});
</script>

{% endblock %}
