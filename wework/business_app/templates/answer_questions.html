{% extends "base.html" %}
{% block content %}

<div class="container mt-4" style="max-width: 600px;">
    <h3 class="mb-3">Answer Security Questions</h3>

    <form method="POST" action="{{ url_for('validate_answers') }}">
        <input type="hidden" name="user_id" value="{{ user.id }}">

        {% for i in range(1,6) %}
        <label class="mt-3">{{ questions['question' ~ i] }}</label>
        <input type="text" name="answer{{ i }}" class="form-control" required>
        {% endfor %}

        <button class="btn btn-primary mt-4 w-100">Verify Answers</button>
    </form>
</div>

{% endblock %}
