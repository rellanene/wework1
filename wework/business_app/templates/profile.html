{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<h1 class="page-title">Profile</h1>
<div class="card">
    <p><strong>Name:</strong> {{ user.name }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Role:</strong> {{ user.role|capitalize }}</p>
</div>
{% endblock %}
