{% extends "base.html" %}
{% block content %}

<style>
    .reset-wrapper {
        min-height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .reset-card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        padding: 35px 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        border: 1px solid #e6e9ef;
    }

    .reset-title {
        font-weight: 700;
        color: #000000;
        text-align: center;
        margin-bottom: 25px;
    }
</style>

<div class="reset-wrapper">
    <div class="reset-card">

        <h3 class="reset-title">Reset Password</h3>

        <form method="POST">
            <label>Enter your email</label>
            <input type="email" name="email" class="form-control" required>

            <button class="btn btn-primary mt-4 w-100">Continue</button>
        </form>

    </div>
</div>

{% endblock %}
