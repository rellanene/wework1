<div class="feed-card">

    <h2 style="margin-bottom:10px;">Feed Post</h2>

    <div style="padding:10px; border:1px solid #e5e7eb; border-radius:6px; margin-bottom:15px;">
        <strong>{{ post.user }}</strong><br>
        <div style="white-space:pre-wrap; margin-top:6px;">{{ post.text }}</div>
        <div style="font-size:12px; color:#6b7280; margin-top:4px;">{{ post.created_at }}</div>
    </div>

    <h3>Comments</h3>

    <div style="max-height:40vh; overflow-y:auto; border:1px solid #e5e7eb; padding:10px; border-radius:6px;">
        {% for c in comments %}
            <div style="padding:6px; border-bottom:1px solid #eee;">
                <strong>{{ c.user }}</strong><br>
                {{ c.text }}<br>
                <span style="font-size:11px; color:#6b7280;">{{ c.created_at }}</span>
            </div>
        {% endfor %}
    </div>

    <div style="margin-top:10px; display:flex; gap:10px;">
        <input id="commentText" class="form-control" placeholder="Write a comment...">
        <button class="btn-primary" onclick="addFeedComment({{ post.id }})">Comment</button>
    </div>

</div>
